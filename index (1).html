<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>字體編輯器</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;700&family=Noto+Serif+TC:wght@400;700&family=LXGW+WenKai+TC&family=Zen+Old+Mincho&family=BIZ+UDMincho&family=Huninn&family=Iansui&family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Cormorant+Garant:ital,wght@0,400;0,600;1,400&family=DM+Serif+Display:ital@0;1&family=Bebas+Neue&family=Pacifico&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #ffffff;
    --bg2: #f5f5f3;
    --bg3: #ebebea;
    --text: #1a1a1a;
    --text2: #6b6b6b;
    --border: rgba(0,0,0,0.12);
    --border2: rgba(0,0,0,0.22);
    --radius: 8px;
    --radius-lg: 12px;
  }

  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #1a1a1a;
      --bg2: #242424;
      --bg3: #2e2e2e;
      --text: #f0f0f0;
      --text2: #999;
      --border: rgba(255,255,255,0.12);
      --border2: rgba(255,255,255,0.22);
    }
  }

  body {
    font-family: 'Noto Sans TC', -apple-system, BlinkMacSystemFont, sans-serif;
    background: var(--bg3);
    color: var(--text);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
  }

  header {
    padding: 14px 24px;
    background: var(--bg);
    border-bottom: 0.5px solid var(--border);
    display: flex;
    align-items: center;
    gap: 10px;
  }

  header h1 { font-size: 16px; font-weight: 500; }
  header .sub { font-size: 12px; color: var(--text2); }

  .app {
    display: grid;
    grid-template-columns: 300px 1fr;
    flex: 1;
    max-width: 1200px;
    width: 100%;
    margin: 24px auto;
    border-radius: var(--radius-lg);
    overflow: hidden;
    border: 0.5px solid var(--border);
    background: var(--bg);
    box-shadow: 0 2px 12px rgba(0,0,0,0.06);
  }

  .panel {
    background: var(--bg2);
    border-right: 0.5px solid var(--border);
    padding: 16px;
    overflow-y: auto;
    display: flex;
    flex-direction: column;
    gap: 16px;
    max-height: calc(100vh - 120px);
  }

  .sec-label {
    font-size: 10px;
    font-weight: 500;
    color: var(--text2);
    text-transform: uppercase;
    letter-spacing: .08em;
    margin-bottom: 7px;
  }

  .preview-area {
    background: var(--bg);
    display: flex;
    flex-direction: column;
  }

  .toolbar {
    padding: 10px 16px;
    border-bottom: 0.5px solid var(--border);
    display: flex;
    align-items: center;
    gap: 8px;
    flex-wrap: wrap;
  }

  .toolbar-title { font-size: 13px; color: var(--text2); flex: 1; }

  .canvas-wrap {
    flex: 1;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 24px;
    min-height: 400px;
  }

  #preview-canvas {
    border-radius: var(--radius);
    max-width: 100%;
  }

  /* Textarea */
  textarea {
    width: 100%;
    border: 0.5px solid var(--border);
    border-radius: var(--radius);
    padding: 9px 10px;
    font-size: 15px;
    resize: vertical;
    background: var(--bg);
    color: var(--text);
    min-height: 72px;
    font-family: inherit;
    line-height: 1.5;
  }
  textarea:focus { outline: none; border-color: var(--border2); }

  /* Toggle group */
  .toggle-group {
    display: flex;
    border: 0.5px solid var(--border);
    border-radius: var(--radius);
    overflow: hidden;
  }
  .toggle-btn {
    flex: 1; padding: 6px 4px;
    border: none; background: none; cursor: pointer;
    font-size: 12px; color: var(--text2);
    font-family: inherit;
  }
  .toggle-btn.active {
    background: var(--bg3);
    color: var(--text);
    font-weight: 500;
  }

  /* Font tabs */
  .font-tabs { display: flex; border: 0.5px solid var(--border); border-radius: var(--radius); overflow: hidden; margin-bottom: 8px; }
  .font-tab { flex: 1; padding: 5px 4px; border: none; background: none; cursor: pointer; font-size: 11px; color: var(--text2); font-family: inherit; }
  .font-tab.active { background: var(--bg3); color: var(--text); font-weight: 500; }

  /* Font grid */
  .font-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 5px; }
  .font-btn {
    padding: 7px 5px; border: 0.5px solid var(--border);
    border-radius: var(--radius); background: var(--bg);
    cursor: pointer; font-size: 11px; color: var(--text);
    text-align: center; line-height: 1.3; position: relative;
    font-family: inherit;
  }
  .font-btn:hover { border-color: var(--border2); }
  .font-btn.active { border: 1.5px solid var(--text2); background: var(--bg2); }
  .font-btn .sample { display: block; font-size: 20px; margin-bottom: 3px; }
  .font-btn .del-btn {
    position: absolute; top: 3px; right: 4px;
    font-size: 10px; color: var(--text2);
    background: none; border: none; cursor: pointer;
    line-height: 1; padding: 0; display: none;
  }
  .font-btn:hover .del-btn { display: block; }
  .font-btn .del-btn:hover { color: #c0392b; }

  /* Upload btn */
  .upload-btn {
    width: 100%; padding: 8px;
    border: 0.5px dashed var(--border2);
    border-radius: var(--radius); background: none;
    cursor: pointer; font-size: 12px; color: var(--text2);
    display: flex; align-items: center; justify-content: center; gap: 6px;
    margin-top: 6px; font-family: inherit;
  }
  .upload-btn:hover { background: var(--bg); }

  /* Slider */
  .slider-row { display: flex; align-items: center; gap: 8px; }
  .slider-row input[type=range] { flex: 1; accent-color: var(--text); }
  .sval { font-size: 12px; color: var(--text2); min-width: 34px; text-align: right; }

  /* Align */
  .align-row { display: flex; gap: 5px; }
  .align-btn {
    flex: 1; padding: 6px; border: 0.5px solid var(--border);
    border-radius: var(--radius); background: var(--bg);
    cursor: pointer; font-size: 15px; color: var(--text2);
  }
  .align-btn.active { background: var(--bg3); color: var(--text); border-color: var(--border2); }

  /* Color group tabs */
  .cg-tabs { display: flex; flex-wrap: wrap; gap: 4px; margin-bottom: 8px; }
  .cg-tab {
    padding: 3px 8px; border: 0.5px solid var(--border);
    border-radius: 12px; background: none;
    cursor: pointer; font-size: 11px; color: var(--text2);
    font-family: inherit;
  }
  .cg-tab.active { background: var(--bg3); color: var(--text); font-weight: 500; border-color: var(--border2); }

  /* Swatches */
  .swatches { display: grid; grid-template-columns: repeat(8, 1fr); gap: 4px; }
  .swatch {
    width: 100%; aspect-ratio: 1; border-radius: 4px;
    cursor: pointer; border: 1.5px solid transparent;
    transition: transform .1s;
  }
  .swatch:hover { transform: scale(1.18); }
  .swatch.active { border-color: var(--text); }

  /* Selected color info */
  .sel-info {
    display: flex; align-items: center; gap: 8px;
    margin-top: 8px; padding: 8px;
    background: var(--bg); border-radius: var(--radius);
    border: 0.5px solid var(--border);
  }
  .sel-dot { width: 28px; height: 28px; border-radius: 6px; flex-shrink: 0; border: 0.5px solid var(--border); }
  .sel-name { font-size: 12px; color: var(--text); }
  .sel-hex { font-size: 11px; color: var(--text2); }

  /* BG presets */
  .bg-row { display: flex; gap: 5px; }
  .bg-preset {
    flex: 1; height: 30px; border-radius: var(--radius);
    border: 0.5px solid var(--border); cursor: pointer;
    font-size: 11px; font-weight: 500; font-family: inherit;
  }
  .bg-preset.active { border: 2px solid var(--text2); }
  .custom-bg-row { display: flex; align-items: center; gap: 8px; margin-top: 6px; }
  .custom-bg-row label { font-size: 12px; color: var(--text2); }
  .custom-bg-row input[type=color] {
    width: 32px; height: 32px;
    border: 0.5px solid var(--border); border-radius: var(--radius);
    cursor: pointer; padding: 2px; background: none;
  }

  /* Action buttons */
  .action-btn {
    padding: 7px 12px; border: 0.5px solid var(--border2);
    border-radius: var(--radius); background: none;
    cursor: pointer; font-size: 12px; color: var(--text);
    display: flex; align-items: center; gap: 5px;
    font-family: inherit;
  }
  .action-btn:hover { background: var(--bg2); }
  .action-btn.primary {
    background: var(--text); color: var(--bg);
    border-color: transparent;
  }
  .action-btn.primary:hover { opacity: .85; }

  /* Scrollbar */
  .panel::-webkit-scrollbar { width: 4px; }
  .panel::-webkit-scrollbar-track { background: transparent; }
  .panel::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 4px; }

  @media (max-width: 720px) {
    .app { grid-template-columns: 1fr; margin: 0; border-radius: 0; }
    .panel { max-height: 50vh; }
  }
</style>
</head>
<body>

<header>
  <h1>字體編輯器</h1>
  <span class="sub">繁體中文質感字體工具</span>
</header>

<div class="app">
  <div class="panel">

    <div>
      <div class="sec-label">輸入文字</div>
      <textarea id="text-input" placeholder="在此輸入文字…">在最自在的語言下筆
一字一句都是最真實的你</textarea>
    </div>

    <div>
      <div class="sec-label">書寫方向</div>
      <div class="toggle-group">
        <button class="toggle-btn active" id="btn-h" onclick="setMode('h')">橫書</button>
        <button class="toggle-btn" id="btn-v" onclick="setMode('v')">直書</button>
      </div>
    </div>

    <div>
      <div class="sec-label">對齊</div>
      <div class="align-row">
        <button class="align-btn active" id="al-l" onclick="setAlign('left')" title="置左"><i class="ti ti-align-left"></i></button>
        <button class="align-btn" id="al-c" onclick="setAlign('center')" title="置中"><i class="ti ti-align-center"></i></button>
        <button class="align-btn" id="al-r" onclick="setAlign('right')" title="置右"><i class="ti ti-align-right"></i></button>
      </div>
    </div>

    <div>
      <div class="sec-label">字體</div>
      <div class="font-tabs">
        <button class="font-tab active" id="tab-zh" onclick="switchFontTab('zh', this)">繁體中文</button>
        <button class="font-tab" id="tab-en" onclick="switchFontTab('en', this)">英文</button>
      </div>
      <div class="font-grid" id="font-grid"></div>
      <button class="upload-btn" onclick="document.getElementById('font-upload').click()">
        <i class="ti ti-plus"></i> 新增字體 (.ttf/.otf)
      </button>
      <input type="file" id="font-upload" accept=".ttf,.otf" style="display:none" onchange="loadCustomFont(this)">
    </div>

    <div>
      <div class="sec-label">字距</div>
      <div class="slider-row">
        <input type="range" id="ls" min="-5" max="30" value="2" step="1" oninput="draw()">
        <span class="sval" id="ls-v">2px</span>
      </div>
    </div>

    <div>
      <div class="sec-label">行距</div>
      <div class="slider-row">
        <input type="range" id="lh" min="1.0" max="3.0" value="1.6" step="0.1" oninput="draw()">
        <span class="sval" id="lh-v">1.6</span>
      </div>
    </div>

    <div>
      <div class="sec-label">字級</div>
      <div class="slider-row">
        <input type="range" id="fs" min="14" max="60" value="28" step="1" oninput="draw()">
        <span class="sval" id="fs-v">28px</span>
      </div>
    </div>

    <div>
      <div class="sec-label">文字顏色（日本傳統色）</div>
      <div class="cg-tabs" id="cg-tabs"></div>
      <div class="swatches" id="swatches"></div>
      <div class="sel-info">
        <div class="sel-dot" id="sel-dot" style="background:#2d2d2d"></div>
        <div>
          <div class="sel-name" id="sel-name">墨（すみ）</div>
          <div class="sel-hex" id="sel-hex">#2d2d2d</div>
        </div>
      </div>
    </div>

    <div>
      <div class="sec-label">背景</div>
      <div class="bg-row" id="bg-presets"></div>
      <div class="custom-bg-row">
        <label>自訂背景色</label>
        <input type="color" id="bg-color" value="#ffffff" oninput="onBgCustom()">
      </div>
    </div>

  </div><!-- /panel -->

  <div class="preview-area">
    <div class="toolbar">
      <span class="toolbar-title">預覽</span>
      <button class="action-btn" onclick="copyText()"><i class="ti ti-copy"></i> 複製文字</button>
      <button class="action-btn primary" onclick="exportPNG()"><i class="ti ti-download"></i> 匯出 PNG</button>
    </div>
    <div class="canvas-wrap">
      <canvas id="preview-canvas" width="600" height="400"></canvas>
    </div>
  </div>

</div><!-- /app -->

  ],
};

const BG_PRESETS = [
  {label:'白', color:'#ffffff'}, {label:'米', color:'#f5efe0'},
  {label:'淺灰', color:'#f0eeea'}, {label:'炭', color:'#2a2a2a'},
  {label:'墨', color:'#111111'}, {label:'深藍', color:'#1a2436'},
];

// ── Font UI ──────────────────────────────────────────

function getActiveFonts() { return fontTab === 'zh' ? zhFonts : enFonts; }

function buildFontGrid() {
  const grid = document.getElementById('font-grid');
  grid.innerHTML = '';
  getActiveFonts().forEach(f => {
    const b = document.createElement('button');
    b.className = 'font-btn' + (f === curFont ? ' active' : '');
    b.innerHTML = `<span class="sample" style="font-family:'${f.css}'">${f.sample}</span>${f.name}`;
    if (f.custom) {
      const del = document.createElement('button');
      del.className = 'del-btn';
      del.title = '移除';
      del.textContent = '✕';
      del.onclick = e => { e.stopPropagation(); removeCustomFont(f); };
      b.appendChild(del);
    }
    b.onclick = () => { curFont = f; buildFontGrid(); draw(); };
    grid.appendChild(b);
  });
}

function removeCustomFont(f) {
  if (fontTab === 'zh') zhFonts = zhFonts.filter(x => x !== f);
  else enFonts = enFonts.filter(x => x !== f);
  if (curFont === f) curFont = getActiveFonts()[0];
  buildFontGrid();
  draw();
}

function switchFontTab(tab, el) {
  fontTab = tab;
  document.querySelectorAll('.font-tab').forEach(t => t.classList.remove('active'));
  el.classList.add('active');
  buildFontGrid();
}

function loadCustomFont(input) {
  const file = input.files[0]; if (!file) return;
  const name = file.name.replace(/\.[^.]+$/, '');
  const reader = new FileReader();
  reader.onload = e => {
    const ff = new FontFace(name, e.target.result);
    ff.load().then(loaded => {
      document.fonts.add(loaded);
      const f = { id: 'custom-' + Date.now(), name, css: name, sample: '字', custom: true };
      if (fontTab === 'zh') zhFonts.push(f);
      else enFonts.push(f);
      curFont = f;
      buildFontGrid();
      draw();
    });
  };
  reader.readAsArrayBuffer(file);
  input.value = '';
}

// ── Color UI ─────────────────────────────────────────

function buildColorUI() {
  const tabsEl = document.getElementById('cg-tabs');
  tabsEl.innerHTML = '';
  Object.keys(COLOR_GROUPS).forEach(g => {
    const b = document.createElement('button');
    b.className = 'cg-tab' + (g === curGroup ? ' active' : '');
    b.textContent = g;
    b.onclick = () => { curGroup = g; buildColorUI(); };
    tabsEl.appendChild(b);
  });
  const sw = document.getElementById('swatches');
  sw.innerHTML = '';
  COLOR_GROUPS[curGroup].forEach(c => {
    const d = document.createElement('div');
    d.className = 'swatch' + (c.hex === curTextColor ? ' active' : '');
    d.style.background = c.hex;
    d.title = c.name;
    d.onclick = () => { curTextColor = c.hex; updateSelInfo(c); buildColorUI(); draw(); };
    sw.appendChild(d);
  });
}

function updateSelInfo(c) {
  document.getElementById('sel-dot').style.background = c.hex;
  document.getElementById('sel-name').textContent = c.name;
  document.getElementById('sel-hex').textContent = c.hex;
}

// ── BG ───────────────────────────────────────────────

function buildBgPresets() {
  const row = document.getElementById('bg-presets');
  row.innerHTML = '';
  BG_PRESETS.forEach(p => {
    const b = document.createElement('button');
    b.className = 'bg-preset' + (p.color === curBgColor ? ' active' : '');
    b.style.background = p.color;
    b.style.color = ['#ffffff','#f5efe0','#f0eeea'].includes(p.color) ? '#222' : '#eee';
    b.textContent = p.label;
    b.onclick = () => {
      curBgColor = p.color;
      document.getElementById('bg-color').value = p.color;
      buildBgPresets(); draw();
    };
    row.appendChild(b);
  });
}

function onBgCustom() {
  curBgColor = document.getElementById('bg-color').value;
  buildBgPresets(); draw();
}

// ── Controls ─────────────────────────────────────────

function setMode(m) {
  curMode = m;
  ['h','v'].forEach(x => document.getElementById('btn-'+x).classList.toggle('active', x === m));
  draw();
}

function setAlign(a) {
  curAlign = a;
  ['l','c','r'].forEach((x,i) => document.getElementById('al-'+x).classList.toggle('active', ['left','center','right'][i] === a));
  draw();
}

// ── Draw ─────────────────────────────────────────────

function draw() {
  const canvas = document.getElementById('preview-canvas');
  const ctx = canvas.getContext('2d');
  const ls = parseInt(document.getElementById('ls').value);
  const lh = parseFloat(document.getElementById('lh').value);
  const fs = parseInt(document.getElementById('fs').value);
  document.getElementById('ls-v').textContent = ls + 'px';
  document.getElementById('lh-v').textContent = lh.toFixed(1);
  document.getElementById('fs-v').textContent = fs + 'px';

  const text = document.getElementById('text-input').value || '輸入文字預覽';
  const W = canvas.width, H = canvas.height, padX = 48, padY = 48;
  ctx.fillStyle = curBgColor; ctx.fillRect(0, 0, W, H);
  ctx.fillStyle = curTextColor;
  ctx.textBaseline = 'top';
  ctx.font = `${fs}px '${curFont.css}', serif`;

  const lines = text.split('\n');
  const lineH = Math.round(fs * lh);

  if (curMode === 'h') {
    lines.forEach((line, li) => {
      const y = padY + li * lineH;
      let totalW = 0;
      for (let i = 0; i < line.length; i++)
        totalW += ctx.measureText(line[i]).width + (i < line.length - 1 ? ls : 0);
      let x = curAlign === 'left' ? padX : curAlign === 'center' ? (W - totalW) / 2 : W - padX - totalW;
      for (let ci = 0; ci < line.length; ci++) {
        ctx.fillText(line[ci], x, y);
        x += ctx.measureText(line[ci]).width + ls;
      }
    });
  } else {
    const colW = Math.round(fs * lh);
    lines.forEach((line, li) => {
      const x = W - padX - fs - li * colW;
      line.split('').forEach((ch, ci) => {
        ctx.save();
        if (/[A-Za-z0-9\-]/.test(ch)) {
          ctx.translate(x + fs / 2, padY + ci * lineH + fs / 2);
          ctx.rotate(Math.PI / 2);
          ctx.fillText(ch, -fs / 2, -fs / 2);
        } else {
          ctx.fillText(ch, x, padY + ci * lineH);
        }
        ctx.restore();
      });
    });
  }
}

// ── Actions ──────────────────────────────────────────

function copyText() {
  navigator.clipboard.writeText(document.getElementById('text-input').value).then(() => {
    const btn = event.currentTarget, orig = btn.innerHTML;
    btn.innerHTML = '<i class="ti ti-check"></i> 已複製';
    setTimeout(() => btn.innerHTML = orig, 1500);
  });
}

function exportPNG() {
  const a = document.createElement('a');
  a.download = 'fonting.png';
  a.href = document.getElementById('preview-canvas').toDataURL('image/png');
  a.click();
}

// ── Init ─────────────────────────────────────────────

const jasonFF = new FontFace(
  'JasonHandwriting1',
  'url(https://cdn.jsdelivr.net/gh/max32002/JasonHandWritingFonts@20240409/webfont/JasonHandwriting1-Regular.woff2)'
);
jasonFF.load().then(f => { document.fonts.add(f); draw(); }).catch(() => {});

buildFontGrid();
buildColorUI();
buildBgPresets();
document.getElementById('text-input').addEventListener('input', draw);
document.fonts.ready.then(draw);
setTimeout(draw, 500);
</script>
</body>
